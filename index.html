<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Premium Uploader</title>
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #080808;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1a1a2e, transparent),
                              radial-gradient(circle at bottom left, #0f3443, transparent);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px; /* Desktop limit */
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Progress Container */
        .progress-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: none;
        }

        .progress-container {
            width: 100%;
            background: #222;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #p-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            box-shadow: 0 0 15px var(--primary-color);
            transition: width 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        #percent {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Upload Button */
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 16px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .file-label:active {
            transform: scale(0.96);
        }

        /* বাটন ডিসেবল বা লক করার জন্য CSS ক্লাসিং */
        .file-label.disabled {
            background: #333 !important;
            color: #777 !important;
            cursor: not-allowed !important;
            pointer-events: none; /* এর ফলে ২য় বার আর ক্লিক করা যাবে না */
            box-shadow: none !important;
        }

        .file-label svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            padding: 10px;
            border-radius: 10px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            h2 { font-size: 22px; }
            .file-label { font-size: 15px; padding: 14px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>SURAJ MONDAL PAPPU</h2>
    <p>Ultra Premium File Uploader</p>

    <div class="progress-box" id="p-box">
        <div class="progress-container">
            <div id="p-bar"></div>
        </div>
        <div id="percent">0%</div>
    </div>

    <!-- বাটনটি সহজে কন্ট্রোল করার জন্য একটি ID দেওয়া হলো -->
    <label for="file" class="file-label" id="uploadBtn">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        Select file
    </label>
    <input type="file" id="file" style="display:none">
    
    <div id="status"></div>
</div>

<script>
    const fileIn = document.getElementById('file');
    const pBar = document.getElementById('p-bar');
    const pBox = document.getElementById('p-box');
    const percentText = document.getElementById('percent');
    const status = document.getElementById('status');
    const uploadBtn = document.getElementById('uploadBtn'); // বাটন এলিমেন্ট
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyotYWYpXwwm7_eJlAg2_eN2eYEY93luPH6N6dyq6Up07SkJ6XXEI0ZYTauN6ioJ13fBw/exec"; 

    fileIn.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;

        // ১. ফাইল সিলেক্ট হওয়া মাত্রই বাটনটিকে লক করে দেওয়া হলো
        uploadBtn.classList.add('disabled');
        uploadBtn.innerHTML = `Uploading...`;

        pBox.style.display = "block";
        status.innerText = "Connecting to server...";
        status.style.color = "#aaa";
        
        let progress = 0;
        const interval = setInterval(() => {
            if(progress < 90) {
                progress += Math.random() * 5;
                updateProgress(progress);
            }
        }, 300);

        function updateProgress(val) {
            pBar.style.width = val + "%";
            percentText.innerText = Math.round(val) + "%";
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ 
                    fileData: ev.target.result.split(',')[1], 
                    name: file.name, 
                    type: file.type || "application/octet-stream"
                })
            }).then(() => {
                clearInterval(interval);
                updateProgress(100);
                
                status.innerHTML = "✅ Upload successful! <br><span style='font-size:12px; color:#aaa;'>Thank you for uploading!...</span>";
                status.style.color = "#00ff88";
                
                // পৃষ্ঠা রিলোড হওয়ার আগে বাটন টেক্সট আপডেট
                uploadBtn.innerHTML = `Done!`;
                
                setTimeout(() => {
                    location.reload();
                }, 800);

            }).catch(err => {
                clearInterval(interval);
                status.innerText = "❌ Error: Please try again";
                status.style.color = "#ff4d4d";
                
                // এরর আসলে বাটন আবার সচল করে দেওয়া হলো যেন পুনরায় চেষ্টা করা যায়
                uploadBtn.classList.remove('disabled');
                uploadBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg> Select file`;
            });
        };
        reader.readAsDataURL(file);
    };
</script>

<script src="https://www.drv.tw/inc/wd.js?s=coding-master-suraj-mondal-pappu"></script>
</body>
</html>
